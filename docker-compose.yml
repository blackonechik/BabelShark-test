services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_cool_app_app
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      ROOT_URL: http://localhost:3000
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/meteor
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: babelshark_test
      MYSQL_USER: meteor
      MYSQL_PASSWORD: meteor
      MYSQL_SERVER_ID: 1
    ports:
      - "3000:3000"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: my_cool_app_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: babelshark_test
      MYSQL_USER: meteor
      MYSQL_PASSWORD: meteor
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: my_cool_app_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
